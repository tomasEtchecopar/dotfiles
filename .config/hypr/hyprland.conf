################
### MONITORS ###
################

monitor=,1920x1080@144,0x0,1


#############################
### ENVIRONMENT VARIABLES ###
#############################

env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct
env = ELECTRONE_OZONE_PLATFORM_HINT,auto
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct


###################
### MY PROGRAMS ###
###################

$mainMod    = SUPER
$terminal   = kitty
$fileManager = thunar
$menu       = hyprlauncher


#################
### AUTOSTART ###
#################

exec-once = awww-daemon
exec-once = waybar
exec-once = dunst
exec-once = wal -R
exec-once = systemctl --user start hyprpolkitagent
exec-once = steam -silent
exec-once = discord --start-minimized
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store


######################
### HOME WORKSPACE ###
######################

exec-once = ~/.config/hypr/scripts/home_workspace.sh
exec-once = hyprctl dispatch workspace 10


#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(92A59Cee)
    col.inactive_border = rgba(0c171baa)
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 8
    rounding_power = 2
    active_opacity = 1.0
    inactive_opacity = 0.85
    shadow {
        enabled = true
        range = 8
        render_power = 2
        color = rgba(0c171bee)
    }
    blur {
        enabled = true
        size = 5
        passes = 2
        vibrancy = 0.2
        new_optimizations = true
    }
}

animations {
    enabled = yes, please :)

    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1
    bezier = snappy,         0.1,  1,    0.1,  1

    animation = global,        1,  10, default
    animation = border,        1,  3,  easeOutQuint
    animation = windows,       1,  3,  snappy
    animation = windowsIn,     1,  3,  snappy,      popin 80%
    animation = windowsOut,    1,  2,  linear,      popin 80%
    animation = fadeIn,        1,  2,  almostLinear
    animation = fadeOut,       1,  2,  almostLinear
    animation = fade,          1,  2,  quick
    animation = layers,        1,  3,  easeOutQuint
    animation = layersIn,      1,  3,  easeOutQuint, fade
    animation = layersOut,     1,  2,  linear,       fade
    animation = fadeLayersIn,  1,  2,  almostLinear
    animation = fadeLayersOut, 1,  2,  almostLinear
    animation = workspaces,    1,  4,  snappy,       slide
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = false
}


#############
### INPUT ###
#############

input {
    kb_layout = us
    kb_variant = intl
    kb_model =
    kb_options =
    kb_rules =
    follow_mouse = 1
    sensitivity = 0
    accel_profile = flat
    touchpad {
        natural_scroll = false
    }
}

gesture = 3, horizontal, workspace

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

# Apps
bind = $mainMod, Return,    exec, $terminal
bind = $mainMod, E,         exec, $fileManager
bind = $mainMod, P,         exec, rofi -show drun
bind = $mainMod, R,         exec, pkill waybar && waybar
bind = $mainMod SHIFT, P,   exec, ~/.config/hypr/scripts/wallpaper.sh
bind = $mainMod, Escape, exec, wlogout

# Clipboard
bind = $mainMod, C,         exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

# Screenshots
bind = , Print,           exec, grim ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png
bind = SHIFT, Print,      exec, grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png
bind = $mainMod, Print,   exec, grim -g "$(slurp)" - | wl-copy

# Window management
bind = $mainMod, F,         fullscreen,
bind = $mainMod, W,         killactive,
bind = $mainMod, V,         togglefloating,
bind = $mainMod, space,     pseudo,
bind = $mainMod, M,         exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit

# Layout
bind = $mainMod, S,         layoutmsg, togglesplit

# Focus
bind = $mainMod, h,         movefocus, l
bind = $mainMod, l,         movefocus, r
bind = $mainMod, k,         movefocus, u
bind = $mainMod, j,         movefocus, d

# Move windows
bind = $mainMod SHIFT, h,   movewindow, l
bind = $mainMod SHIFT, l,   movewindow, r
bind = $mainMod SHIFT, k,   movewindow, u
bind = $mainMod SHIFT, j,   movewindow, d

# Workspaces
bind = $mainMod, 1,         workspace, 1
bind = $mainMod, 2,         workspace, 2
bind = $mainMod, 3,         workspace, 3
bind = $mainMod, 4,         workspace, 4
bind = $mainMod, 5,         workspace, 5
bind = $mainMod, 6,         workspace, 6
bind = $mainMod, 7,         workspace, 7
bind = $mainMod, 8,         workspace, 8
bind = $mainMod, 9,         workspace, 9
bind = $mainMod, 0,         workspace, 10

# Move to workspace
bind = $mainMod SHIFT, 1,   movetoworkspace, 1
bind = $mainMod SHIFT, 2,   movetoworkspace, 2
bind = $mainMod SHIFT, 3,   movetoworkspace, 3
bind = $mainMod SHIFT, 4,   movetoworkspace, 4
bind = $mainMod SHIFT, 5,   movetoworkspace, 5
bind = $mainMod SHIFT, 6,   movetoworkspace, 6
bind = $mainMod SHIFT, 7,   movetoworkspace, 7
bind = $mainMod SHIFT, 8,   movetoworkspace, 8
bind = $mainMod SHIFT, 9,   movetoworkspace, 9
bind = $mainMod SHIFT, 0,   movetoworkspace, 10

# Special workspace
bind = $mainMod, S,             togglespecialworkspace, magic
bind = $mainMod SHIFT, S,       movetoworkspace, special:magic

# Mouse
bind  = $mainMod, mouse_down,   workspace, e+1
bind  = $mainMod, mouse_up,     workspace, e-1
bindm = $mainMod, mouse:272,    movewindow
bindm = $mainMod, mouse:273,    resizewindow

# Media keys
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-
bindl  = , XF86AudioNext,         exec, playerctl next
bindl  = , XF86AudioPause,        exec, playerctl play-pause
bindl  = , XF86AudioPlay,         exec, playerctl play-pause
bindl  = , XF86AudioPrev,         exec, playerctl previous


##############################
### WINDOWS AND WORKSPACES ###
##############################

# Home workspace layout
windowrule = match:title ^(pipes|clock|cava|monitor|fastfetch|cmatrix)$, workspace 10
windowrule = match:title ^(pipes)$,    float true, size 640 300,  move 0    30
windowrule = match:title ^(clock)$,    float true, size 640 300,  move 640  30
windowrule = match:title ^(cava)$,     float true, size 640 300,  move 1280 30
windowrule = match:title ^(monitor)$,  float true, size 1020 720, move 0    330
windowrule = match:title ^(fastfetch)$, float true, size 900 516, move 1020 330
windowrule = match:title ^(cmatrix)$,  float true, size 900 204,  move 1020 846

# App workspaces
windowrule = match:class ^(kitty)$,        workspace 1
windowrule = match:class ^(zen)$,  workspace 2
windowrule = match:class ^(Spotify)$,      workspace 3
windowrule = match:class ^(steam)$,        workspace 4
windowrule = match:class ^(discord)$,      workspace 5

# System rules
windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

windowrule {
    name = move-hyprland-run
    match:class = hyprland-run
    move = 20 monitor_h-120
    float = yes
}
